# Gitleaks configuration — extends the default ruleset.
[extend]
useDefault = true

# .env.example is documentation: every value is a blank or a placeholder like
# STOCKTWITS_ENABLED=true. The generic-api-key rule false-positives on
# adjacent KEY= lines there. Real credentials live in .env, which is
# git-ignored and additionally guarded by the pre-commit gitleaks hook.
[allowlist]
description = "Placeholder-only example environment file"
paths = ['''\.env\.example$''']
